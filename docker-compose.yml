version: '3.8'

services:
  zookeeper:
    image: zookeeper:3.8
    container_name: url_shortener_zk
    restart: always
    ports:
      - "2181:2181"
    environment:
      ZOO_MY_ID: 1
      ZOO_PORT: 2181
      # In standalone mode, we don't need to define a cluster
    volumes:
      - zk_data:/data
      - zk_datalog:/datalog

  redis:
    image: redis:alpine
    container_name: url_shortener_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  zk_data:
  zk_datalog:
  redis_data: